<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Yuzu Photoshop</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy:   #1b2d4f;
      --cream:  #f0ede8;
      --gold0:  #f0d050;
      --gold1:  #a06010;
      --white:  #ffffff;
      --text1:  #1a1a1a;
      --text2:  #555;
      --text3:  #aaa;
      --border: #e3dfd9;
      --card:   #ffffff;
      --radius: 14px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
      background: var(--cream);
      color: var(--text1);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-bottom: 80px;
    }

    /* ── Header ── */
    .site-header {
      width: 100%;
      background: var(--navy);
      padding: 20px 32px;
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 44px;
    }

    .yuzu-logo svg { display: block; }

    .header-text { flex: 1; }

    .header-brand {
      font-size: 0.78rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.45);
      margin-bottom: 2px;
    }

    .header-title {
      font-size: 1.15rem;
      font-weight: 700;
      color: #fff;
      letter-spacing: 0.04em;
    }

    .header-nav {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .header-nav a {
      font-size: 0.72rem;
      letter-spacing: 0.06em;
      color: rgba(255,255,255,0.5);
      text-decoration: none;
      padding: 6px 12px;
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 100px;
      transition: all 0.15s;
    }

    .header-nav a:hover {
      color: #fff;
      border-color: rgba(255,255,255,0.4);
    }

    /* ── Main layout ── */
    .container {
      width: 100%;
      max-width: 640px;
      padding: 0 20px;
    }

    .section-label {
      font-size: 0.68rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--text3);
      margin-bottom: 14px;
    }

    /* ── Style buttons ── */
    .style-grid {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 20px;
    }

    .style-btn {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 18px 20px;
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      cursor: pointer;
      transition: all 0.18s ease;
      text-align: left;
      width: 100%;
      color: var(--text1);
    }

    .style-btn:hover {
      border-color: #c8c3bb;
      background: #faf8f5;
      transform: translateY(-1px);
      box-shadow: 0 4px 18px rgba(0,0,0,0.07);
    }

    .style-btn.active {
      background: var(--navy);
      border-color: var(--navy);
      color: #fff;
      box-shadow: 0 4px 22px rgba(27,45,79,0.3);
    }

    .btn-badge {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      background: var(--cream);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.3rem;
      flex-shrink: 0;
      transition: background 0.18s;
    }

    .style-btn.active .btn-badge {
      background: rgba(255,255,255,0.12);
    }

    .btn-name {
      font-size: 0.95rem;
      font-weight: 600;
      margin-bottom: 3px;
      letter-spacing: 0.01em;
    }

    .btn-desc {
      font-size: 0.72rem;
      opacity: 0.5;
    }

    .style-btn.active .btn-desc { opacity: 0.6; }

    /* ── Strength control ── */
    .strength-section {
      margin-bottom: 28px;
    }

    .strength-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 10px;
    }

    .strength-pills {
      display: flex;
      gap: 6px;
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: 100px;
      padding: 4px;
    }

    .strength-pill {
      flex: 1;
      padding: 7px 16px;
      background: transparent;
      border: none;
      border-radius: 100px;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      color: var(--text2);
      cursor: pointer;
      transition: all 0.18s ease;
      white-space: nowrap;
    }

    .strength-pill:hover {
      color: var(--text1);
      background: rgba(0,0,0,0.04);
    }

    .strength-pill.active {
      background: var(--navy);
      color: #fff;
      box-shadow: 0 2px 8px rgba(27,45,79,0.25);
    }

    .strength-badge {
      font-size: 0.65rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 3px 10px;
      border-radius: 100px;
      font-weight: 700;
    }

    .strength-badge.light  { background: #eef3f8; color: #6b8aad; }
    .strength-badge.medium { background: #e8edf5; color: #3d5a82; }
    .strength-badge.strong { background: #dce4f0; color: #1b2d4f; }

    /* ── Divider ── */
    .divider {
      height: 1px;
      background: var(--border);
      margin: 28px 0;
    }

    /* ── Prompt area ── */
    textarea {
      width: 100%;
      min-height: 280px;
      padding: 20px;
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      font-size: 0.875rem;
      line-height: 1.8;
      color: #3a3a3a;
      resize: vertical;
      outline: none;
      transition: border-color 0.15s;
      font-family: inherit;
    }

    textarea:focus { border-color: var(--navy); }

    /* ── Copy button ── */
    .copy-btn {
      width: 100%;
      margin-top: 12px;
      padding: 16px;
      background: var(--navy);
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 0.875rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      cursor: pointer;
      transition: all 0.18s ease;
    }

    .copy-btn:hover {
      background: #142240;
      transform: translateY(-1px);
      box-shadow: 0 6px 22px rgba(27,45,79,0.3);
    }

    .copy-btn:active { transform: translateY(0); }

    .copy-btn.success {
      background: #3d7a56;
      letter-spacing: 0.06em;
    }

    /* ── Toast ── */
    .toast {
      position: fixed;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%) translateY(16px);
      background: var(--navy);
      color: #fff;
      padding: 11px 22px;
      border-radius: 100px;
      font-size: 0.78rem;
      letter-spacing: 0.05em;
      opacity: 0;
      transition: all 0.28s ease;
      pointer-events: none;
      white-space: nowrap;
      z-index: 100;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* ── Floating nav dock ── */
    .fab-dock {
      position: fixed;
      bottom: 28px;
      right: 24px;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 10px;
      z-index: 90;
    }

    .fab-btn {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 16px 10px 12px;
      background: var(--navy);
      color: rgba(255,255,255,0.85);
      border-radius: 100px;
      text-decoration: none;
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      box-shadow: 0 4px 18px rgba(27,45,79,0.35);
      transition: all 0.18s ease;
      border: 1.5px solid rgba(255,255,255,0.1);
    }

    .fab-btn:hover {
      background: #142240;
      color: #fff;
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(27,45,79,0.45);
    }

    .fab-icon {
      width: 28px;
      height: 28px;
      background: rgba(255,255,255,0.1);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.9rem;
    }

    /* ── Footer ── */
    .site-footer {
      text-align: center;
      margin-top: 48px;
      font-size: 0.72rem;
      color: var(--text3);
      letter-spacing: 0.04em;
    }

    @media (max-width: 480px) {
      .site-header { padding: 16px 20px; margin-bottom: 32px; }
      .header-nav { display: none; }
      textarea { min-height: 200px; }
      .fab-dock { bottom: 20px; right: 16px; }
      .strength-pill { padding: 7px 10px; }
    }
  </style>
</head>
<body>

  <!-- Header -->
  <header class="site-header">
    <div class="yuzu-logo">
      <svg width="36" height="36" viewBox="0 0 34 34" fill="none" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <radialGradient id="yg" cx="38%" cy="28%" r="72%">
            <stop offset="0%" stop-color="#f0d050"/>
            <stop offset="100%" stop-color="#a06010"/>
          </radialGradient>
        </defs>
        <circle cx="17" cy="17" r="17" fill="url(#yg)"/>
        <circle cx="17" cy="17" r="11.5" fill="none" stroke="rgba(255,255,255,.45)" stroke-width="1.2"/>
        <circle cx="17" cy="17" r="2.8" fill="rgba(255,255,255,.75)"/>
        <line x1="17" y1="14.2" x2="10.5" y2="7.5" stroke="rgba(255,255,255,.7)" stroke-width="1.4" stroke-linecap="round"/>
        <line x1="17" y1="14.2" x2="23.5" y2="7.5" stroke="rgba(255,255,255,.7)" stroke-width="1.4" stroke-linecap="round"/>
        <line x1="17" y1="14.2" x2="17"   y2="23"  stroke="rgba(255,255,255,.7)" stroke-width="1.4" stroke-linecap="round"/>
        <line x1="17" y1="5.5"  x2="17"   y2="14.2" stroke="rgba(255,255,255,.2)" stroke-width="1" stroke-linecap="round"/>
        <line x1="6.8" y1="22.5" x2="12.5" y2="18.5" stroke="rgba(255,255,255,.2)" stroke-width="1" stroke-linecap="round"/>
        <line x1="27.2" y1="22.5" x2="21.5" y2="18.5" stroke="rgba(255,255,255,.2)" stroke-width="1" stroke-linecap="round"/>
      </svg>
    </div>
    <div class="header-text">
      <div class="header-brand">Yuzu</div>
      <div class="header-title">Photoshop</div>
    </div>
    <nav class="header-nav">
      <a href="https://ianian22493.github.io/daily-brief/" target="_blank">每日簡報</a>
      <a href="https://ianian22493.github.io/investment-dashboard/" target="_blank">Finance</a>
    </nav>
  </header>

  <!-- Main -->
  <main class="container">

    <p class="section-label">選擇圖片風格</p>
    <div class="style-grid" id="styleGrid"></div>

    <!-- Strength control -->
    <div class="strength-section">
      <div class="strength-header">
        <p class="section-label" style="margin-bottom:0;">風格強度</p>
        <span class="strength-badge" id="strengthBadge"></span>
      </div>
      <div class="strength-pills" id="strengthPills"></div>
    </div>

    <div class="divider"></div>

    <p class="section-label">Prompt 內容</p>
    <textarea id="promptOutput" readonly></textarea>
    <button class="copy-btn" id="copyBtn" onclick="copyPrompt()">複製 Prompt</button>

    <footer class="site-footer">Yuzu Photoshop · 圖片風格 Prompt 工具</footer>
  </main>

  <!-- Floating nav dock -->
  <div class="fab-dock">
    <a class="fab-btn" href="https://ianian22493.github.io/daily-brief/" target="_blank">
      <span class="fab-icon">📰</span>
      每日簡報
    </a>
    <a class="fab-btn" href="https://ianian22493.github.io/investment-dashboard/" target="_blank">
      <span class="fab-icon">📈</span>
      Yuzu Finance
    </a>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast">✓ 已複製到剪貼簿</div>

  <script>
    const styles = [
      {
        id: 'handdrawn',
        icon: '✏️',
        name: '手繪註解風',
        desc: '在照片上疊加手繪塗鴉與手寫備忘',
        base:
`Keep the original food photo unchanged and realistic.

Draw minimal white hand-drawn doodles ONLY around the edges of the food:
- thin, slightly uneven lines (one-line sketch style)
- avoid drawing over the main surface of the food

Add small handwritten annotations in a cute Japanese style:
- use short phrases in Chinese or Japanese (e.g. 好吃, 超讚, ちょっと幸せ)
- keep text small and light
- place text near the food, not covering key details

Add subtle decorations:
- arrows or dashed lines pointing to details
- small steam lines to indicate warmth
- a few tiny sparkles or hearts

Style and mood:
- Instagram story aesthetic
- cozy, soft, slightly lazy feeling
- natural and not overly designed

Constraints:
- DO NOT block or cover the food
- DO NOT add too many doodles
- DO NOT change original colors or lighting
- keep plenty of empty space`,
        strength: {
          light:
`Intensity: Light —
Keep doodles minimal and subtle.
Use very few annotations.
Keep lots of empty space.`,
          medium:
`Intensity: Medium —
Add a moderate amount of doodles and annotations.
Include arrows, dashed lines, and small decorations like steam or sparkles.
Maintain balance and avoid clutter.`,
          strong:
`Intensity: Strong —
Add more visible doodles and annotations.
Make the drawings slightly more playful and expressive.
Include multiple arrows, notes, and decorative elements, but still do not block the food.`
        }
      },
      {
        id: 'magazine',
        icon: '🗞️',
        name: '日系雜誌風',
        desc: '極簡排版、高質感攝影、大量留白',
        base:
`Transform the image into a Japanese editorial magazine style.

Composition:
- clean and balanced layout
- strong use of negative space (whitespace)
- subject placed slightly off-center

Lighting:
- soft natural light
- gentle shadows, not harsh

Color:
- neutral and slightly muted tones
- avoid overly saturated colors

Style:
- minimal, calm, and refined
- similar to Japanese lifestyle magazines (MUJI, BRUTUS)

Details:
- keep textures natural and realistic
- no extra decorations or graphic elements

Constraints:
- DO NOT add text or doodles
- DO NOT over-enhance contrast
- maintain a soft and elegant atmosphere`,
        strength: {
          light:
`Intensity: Light —
Apply very subtle adjustments. Keep the image very close to the original with slightly cleaner composition and softer lighting.`,
          medium:
`Intensity: Medium —
Moderately enhance composition and lighting. Improve balance, whitespace, and overall editorial feeling.`,
          strong:
`Intensity: Strong —
Make the composition more stylized and refined. Increase the sense of structure, spacing, and editorial design while keeping a natural look.`
        }
      },
      {
        id: 'film',
        icon: '🎞️',
        name: '底片復古風',
        desc: '底片顆粒、褪色色調、溫暖過曝感',
        base:
`Apply a realistic analog film photography look.

Color and tone:
- slightly warm tone
- mildly faded colors (not overly yellow)
- soft contrast

Texture:
- subtle film grain (fine, not heavy)
- slight imperfections for realism

Lighting:
- slightly overexposed highlights
- soft glow in bright areas

Style:
- nostalgic, calm, everyday moment feeling
- like a casual photo taken with a film camera

Constraints:
- DO NOT make it too dark or too yellow
- DO NOT overuse grain
- keep image details visible and natural`,
        strength: {
          light:
`Intensity: Light —
Apply very subtle film grain and a slight warm tone. Keep the effect barely noticeable.`,
          medium:
`Intensity: Medium —
Use moderate grain and slightly faded colors. Add a soft nostalgic tone with balanced contrast.`,
          strong:
`Intensity: Strong —
Increase visible film grain and vintage tone. Make colors more faded and nostalgic, while still keeping image details clear.`
        }
      }
    ];

    const strengthOptions = [
      { id: 'light',  label: 'Light',  badgeLabel: 'Light',  badgeClass: 'light'  },
      { id: 'medium', label: 'Medium', badgeLabel: 'Medium', badgeClass: 'medium' },
      { id: 'strong', label: 'Strong', badgeLabel: 'Strong', badgeClass: 'strong' },
    ];

    let activeStyleId  = styles[0].id;
    let activeStrength = 'medium';

    function buildPrompt() {
      const style = styles.find(s => s.id === activeStyleId);
      return style.base + '\n\n' + style.strength[activeStrength];
    }

    function renderStyles() {
      const grid = document.getElementById('styleGrid');
      grid.innerHTML = '';
      styles.forEach(s => {
        const btn = document.createElement('button');
        btn.className = 'style-btn' + (s.id === activeStyleId ? ' active' : '');
        btn.innerHTML = `
          <span class="btn-badge">${s.icon}</span>
          <span>
            <div class="btn-name">${s.name}</div>
            <div class="btn-desc">${s.desc}</div>
          </span>
        `;
        btn.onclick = () => { activeStyleId = s.id; update(); };
        grid.appendChild(btn);
      });
    }

    function renderStrength() {
      const container = document.getElementById('strengthPills');
      container.innerHTML = '';
      strengthOptions.forEach(opt => {
        const btn = document.createElement('button');
        btn.className = 'strength-pill' + (opt.id === activeStrength ? ' active' : '');
        btn.textContent = opt.label;
        btn.onclick = () => { activeStrength = opt.id; update(); };
        container.appendChild(btn);
      });

      const badge = document.getElementById('strengthBadge');
      const current = strengthOptions.find(o => o.id === activeStrength);
      badge.textContent = current.badgeLabel;
      badge.className = 'strength-badge ' + current.badgeClass;
    }

    function update() {
      renderStyles();
      renderStrength();
      document.getElementById('promptOutput').value = buildPrompt();
    }

    function copyPrompt() {
      const text = document.getElementById('promptOutput').value;
      if (!text) return;
      navigator.clipboard.writeText(text).then(feedback).catch(() => {
        document.getElementById('promptOutput').select();
        document.execCommand('copy');
        feedback();
      });
    }

    function feedback() {
      const btn = document.getElementById('copyBtn');
      btn.textContent = '✓ 已複製';
      btn.classList.add('success');
      setTimeout(() => {
        btn.textContent = '複製 Prompt';
        btn.classList.remove('success');
      }, 2200);
      const toast = document.getElementById('toast');
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2400);
    }

    update();
  </script>

</body>
</html>
